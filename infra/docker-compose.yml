services:
  db:
    image: postgres:16-alpine
    container_name: sports-alerts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: sports-alerts-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /opt/venv
    ports:
      - "8000:8000"
    volumes:
      - ../services:/app/services
    working_dir: /app/services/api
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host ${API_HOST} --port ${API_PORT}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: sports-alerts-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PYTHONPATH: /app/services/api:/app/services/worker
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - ../services:/app/services
    working_dir: /app/services/worker
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: uv run python -m worker.main

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: sports-alerts-web
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app/apps/web
      - web_node_modules:/app/apps/web/node_modules
    working_dir: /app/apps/web
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  web_node_modules:
